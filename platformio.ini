; ESP-FIDO: M5StickC S3 FIDO2 Security Key
; https://docs.m5stack.com/en/core/M5StickC%20S3

[platformio]
default_envs = m5stickc-s3

[env:m5stickc-s3]
platform = espressif32
board = m5stickc-s3
framework = arduino

; Custom board definition
board_build.custom_board = true

; PSRAM
board_build.arduino.memory_type = qio_opi
board_build.flash_size = 8MB
board_build.psram_size = 2MB

; Use sdkconfig.defaults for TinyUSB config
board_build.arduino.custom_sdkconfig = sdkconfig.defaults

; USB CDC (for debug serial over USB-C)
monitor_speed = 115200

; Build flags
build_flags =
    -DM5STICKC_S3

lib_deps =
    adafruit/Adafruit TinyUSB Library @ ^2.3
    m5stack/M5GFX @ ^0.2
    kmackay/micro-ecc @ ^1.0
    sgoudsme/tinycbor @ ^0.6

lib_ldf_mode = deep+