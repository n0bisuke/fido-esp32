; ESP-FIDO: FIDO2 Security Key for Seeed Studio XIAO ESP32-S3
; https://www.seeedstudio.com/XIAO-ESP32S3-p-5627.html

[platformio]
default_envs = xiao-esp32s3

; --- Shared configuration ---
[env]
framework = arduino
monitor_speed = 115200
lib_deps =
    adafruit/Adafruit TinyUSB Library @ ^2.3
    kmackay/micro-ecc @ ^1.0
    sgoudsme/tinycbor @ ^0.6
lib_ldf_mode = deep+

; --- Seeed Studio XIAO ESP32-S3 (TinyUSB HID mode) ---
; Uses standard board def with ARDUINO_USB_MODE overridden to 0 (TinyUSB/OTG)
; ARDUINO_USB_CDC_ON_BOOT=1 (from standard board) ensures USB.begin() is called in app_main()
[env:xiao-esp32s3]
platform = espressif32
board = seeed_xiao_esp32s3
board_build.arduino.memory_type = qio_opi
board_build.psram_size = 2MB
build_unflags =
    -DARDUINO_USB_MODE=1
build_flags =
    -DARDUINO_USB_MODE=0
    -DXIAO_ESP32S3
    -DCORE_DEBUG_LEVEL=3

; --- Minimal test: standard CDC mode (no TinyUSB) ---
[env:xiao-test]
platform = espressif32
board = seeed_xiao_esp32s3
build_flags =
    -DXIAO_ESP32S3
build_src_filter =
    -<*>
    +<../test_src/main_test.cpp>
lib_ignore =
    Adafruit TinyUSB Library
    micro-ecc
    tinycbor

; --- TinyUSB CDC test: verify USB-OTG works ---
[env:xiao-tinyusb-test]
platform = espressif32
board = seeed_xiao_esp32s3
board_build.arduino.memory_type = qio_opi
board_build.psram_size = 2MB
build_unflags =
    -DARDUINO_USB_MODE=1
build_flags =
    -DARDUINO_USB_MODE=0
    -DXIAO_ESP32S3
    -DCORE_DEBUG_LEVEL=3
build_src_filter =
    -<*>
    +<../test_src/main_tinyusb_test.cpp>
lib_deps =
    adafruit/Adafruit TinyUSB Library @ ^2.3
lib_ignore =
    micro-ecc
    tinycbor