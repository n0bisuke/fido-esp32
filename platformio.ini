; ESP-FIDO: FIDO2 Security Key for M5Stack devices
; https://docs.m5stack.com/en/core/AtomS3

[platformio]
default_envs = atoms3

; --- Shared configuration ---
[env]
framework = arduino
monitor_speed = 115200
lib_deps =
    adafruit/Adafruit TinyUSB Library @ ^2.3
    m5stack/M5GFX @ ^0.2
    kmackay/micro-ecc @ ^1.0
    sgoudsme/tinycbor @ ^0.6
lib_ldf_mode = deep+

; --- M5Stack AtomS3 (primary target, TinyUSB mode) ---
[env:atoms3]
platform = espressif32
board = atoms3-tinyusb
board_build.custom_board = true
board_build.arduino.custom_sdkconfig = sdkconfig.defaults
build_flags =
    -DATOMS3

; --- M5StickC S3 (secondary target) ---
[env:m5stickc-s3]
platform = espressif32
board = m5stickc-s3
board_build.custom_board = true
board_build.arduino.memory_type = qio_opi
board_build.flash_size = 8MB
board_build.psram_size = 2MB
board_build.arduino.custom_sdkconfig = sdkconfig.defaults
build_flags =
    -DM5STICKC_S3